services:
  bot:
    image: suslik000ilya/termidesk_bot:latest
    container_name: termidesk_bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - qdrant
    networks:
      - termidesk_network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: termidesk_redis
    ports:
      - "6379:6379"
    networks:
      - termidesk_network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: termidesk_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - termidesk_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: termidesk_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - termidesk_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: termidesk_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - termidesk_network
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: termidesk_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - termidesk_network
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: termidesk_logstash
    ports:
      - "50000:50000/tcp"
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - termidesk_network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: termidesk_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - "NODE_OPTIONS=--max-old-space-size=512"
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=a_random_32_character_string_here!
      - XPACK_SECURITY_ENCRYPTIONKEY=a_random_32_character_string_here!
      - XPACK_REPORTING_ENCRYPTIONKEY=a_random_32_character_string_here!
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - termidesk_network
    restart: unless-stopped

networks:
  termidesk_network:
    driver: bridge
